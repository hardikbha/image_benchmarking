# DFToolBench-I model configurations
# Covers the 35 LLMs evaluated in the benchmark.
#
# Fields per model
# ----------------
# name          : Human-readable display name used in result tables.
# model_id      : Model identifier string passed to the API / local runner.
# family        : Model family (gpt / claude / qwen / internlm / other).
# provider      : API provider: openai | anthropic | local
# size          : Approximate parameter count as a string (e.g. "7B").
# tool_calling  : Whether the model supports native tool/function calling.
# notes         : Optional free-form annotation.

models:

  # --------------------------------------------------------------------------
  # GPT family (OpenAI)
  # --------------------------------------------------------------------------

  - name: GPT-5
    model_id: gpt-5
    family: gpt
    provider: openai
    size: unknown
    tool_calling: true
    notes: "Latest GPT-5 flagship model."

  - name: GPT-4.1
    model_id: gpt-4.1
    family: gpt
    provider: openai
    size: unknown
    tool_calling: true
    notes: "GPT-4.1 release."

  - name: GPT-4o
